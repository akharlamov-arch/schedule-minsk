<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Work Hours — Minsk Team</title>
  <style>
    :root {
      --wd-color: #0ea5e9;
      --we-color: #f97316;
      --bg: #f1f5f9;
      --card: #ffffff;
      --text: #1e293b;
      --muted: #64748b;
      --border: #e2e8f0;
      --calc-bg: #eff6ff;
      --calc-fg: #2563eb;
      --radius: 14px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1rem 4rem;
    }

    /* ── Header ── */
    .page-header {
      text-align: center;
      margin-bottom: 2rem;
    }
    .page-header h1 {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .page-header p {
      color: var(--muted);
      font-size: 0.9rem;
      margin-top: 0.3rem;
    }

    /* ── Settings bar ── */
    .settings-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      gap: 0.55rem;
      background: var(--card);
      border-radius: var(--radius);
      padding: 0.7rem 1.4rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
      width: fit-content;
      margin: 0 auto 2.5rem;
      font-size: 0.84rem;
      color: var(--muted);
    }
    .settings-bar select,
    .settings-bar input[type="number"] {
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 0.28rem 0.45rem;
      font-size: 0.84rem;
      color: var(--text);
      background: white;
      outline: none;
      transition: border-color 0.18s;
    }
    .settings-bar select:focus,
    .settings-bar input[type="number"]:focus { border-color: var(--wd-color); }
    .settings-bar input[type="number"] { width: 62px; text-align: center; }
    .bar-sep {
      width: 1px; height: 20px;
      background: var(--border);
      margin: 0 0.3rem;
    }

    /* ── Group wrapper ── */
    .group {
      max-width: 980px;
      margin: 0 auto 2.5rem;
    }
    .group-header {
      display: flex;
      align-items: flex-start;
      gap: 0.6rem;
      margin-bottom: 1.1rem;
      padding-bottom: 0.7rem;
      border-bottom: 2px solid var(--border);
    }
    .group-dot {
      width: 11px; height: 11px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 5px;
    }
    .weekday .group-dot { background: var(--wd-color); }
    .weekend .group-dot { background: var(--we-color); }

    .group-title-wrap { display: flex; flex-direction: column; gap: 0.38rem; flex: 1; }

    .group-title-input {
      font-size: 1.05rem;
      font-weight: 700;
      border: none;
      background: transparent;
      color: var(--text);
      outline: none;
      min-width: 120px;
    }

    /* Day toggles row */
    .days-row { display: flex; gap: 0.22rem; flex-wrap: wrap; align-items: center; }
    .day-toggle {
      font-size: 0.68rem;
      font-weight: 600;
      padding: 0.16rem 0.42rem;
      border-radius: 5px;
      border: 1.5px solid var(--border);
      background: white;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
      line-height: 1.4;
      user-select: none;
    }
    .weekday .day-toggle.active { border-color: var(--wd-color); background: var(--wd-color); color: white; }
    .weekend .day-toggle.active { border-color: var(--we-color); background: var(--we-color); color: white; }

    .wdays-badge {
      font-size: 0.7rem;
      color: var(--muted);
      background: var(--bg);
      padding: 0.16rem 0.52rem;
      border-radius: 5px;
      border: 1px solid var(--border);
      white-space: nowrap;
      margin-left: 0.25rem;
    }

    .group-header .add-emp-btn {
      margin-left: auto;
      background: none;
      border: 1.5px dashed var(--border);
      border-radius: 8px;
      padding: 0.3rem 0.75rem;
      font-size: 0.8rem;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .group-header .add-emp-btn:hover { border-color: var(--wd-color); color: var(--wd-color); }
    .weekend .group-header .add-emp-btn:hover { border-color: var(--we-color); color: var(--we-color); }

    /* ── Cards grid ── */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.1rem;
    }

    /* ── Card ── */
    .card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 1.25rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      border-top: 4px solid var(--wd-color);
      position: relative;
    }
    .weekend .card { border-top-color: var(--we-color); }

    .card-del {
      position: absolute;
      top: 1.25rem; right: 1.25rem;
      background: none;
      border: none;
      cursor: pointer;
      color: #cbd5e1;
      font-size: 1rem;
      line-height: 1;
      padding: 2px 4px;
      border-radius: 6px;
      transition: color 0.15s;
    }
    .card-del:hover { color: #ef4444; }

    .card-name-row {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      margin-bottom: 0.9rem;
      padding-right: 1.5rem;
    }
    .avatar {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: var(--wd-color);
      color: white;
      font-weight: 700;
      font-size: 1rem;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .weekend .avatar { background: var(--we-color); }

    .name-input {
      font-size: 0.97rem;
      font-weight: 700;
      border: none;
      border-bottom: 2px solid var(--border);
      padding: 0.2rem 0;
      background: transparent;
      color: var(--text);
      outline: none;
      width: 100%;
      transition: border-color 0.2s;
    }
    .name-input:focus { border-bottom-color: var(--wd-color); }
    .weekend .name-input:focus { border-bottom-color: var(--we-color); }

    .shift-input {
      font-size: 0.72rem;
      font-weight: 600;
      border: 1.5px solid var(--border);
      border-radius: 999px;
      padding: 0.18rem 0.65rem;
      background: #f8fafc;
      color: var(--muted);
      outline: none;
      display: inline-block;
      margin-bottom: 1rem;
      max-width: 100%;
    }

    .field-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.65rem;
      gap: 0.5rem;
    }
    .field-label {
      font-size: 0.78rem;
      color: var(--muted);
      font-weight: 500;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .field-right {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      flex-shrink: 0;
    }
    .time-sep { font-size: 0.78rem; color: var(--muted); margin: 0 2px; }

    .time-chip {
      display: inline-flex;
      align-items: center;
      background: white;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 0.28rem 0.65rem;
      font-size: 0.88rem;
      font-weight: 700;
      color: var(--text);
      cursor: pointer;
      transition: border-color 0.18s, background 0.15s;
      letter-spacing: 0.02em;
      min-width: 54px;
      justify-content: center;
      user-select: none;
    }
    .time-chip:hover { border-color: var(--wd-color); background: #f0f9ff; }
    .weekend .time-chip:hover { border-color: var(--we-color); background: #fff7ed; }
    .time-chip.editing { padding: 0; border-color: var(--wd-color); background: white; }
    .weekend .time-chip.editing { border-color: var(--we-color); }
    .time-chip input {
      border: none;
      outline: none;
      background: transparent;
      font-size: 0.88rem;
      font-weight: 700;
      color: var(--text);
      width: 54px;
      text-align: center;
      padding: 0.28rem 0.5rem;
      letter-spacing: 0.02em;
    }

    .minsk-time {
      font-size: 0.82rem;
      color: var(--muted);
      background: #f8fafc;
      padding: 0.32rem 0.6rem;
      border-radius: 8px;
      border: 1.5px solid var(--border);
      white-space: nowrap;
    }
    .next-day {
      font-size: 0.65rem;
      color: #94a3b8;
      margin-left: 2px;
    }

    .divider { height: 1px; background: var(--border); margin: 0.85rem 0; }

    .calc-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--calc-bg);
      border-radius: 9px;
      padding: 0.48rem 0.75rem;
      margin-bottom: 0.45rem;
    }
    .calc-row:last-child { margin-bottom: 0; }
    .calc-label { font-size: 0.78rem; color: #3b82f6; font-weight: 500; }
    .calc-value { font-size: 1rem; font-weight: 700; color: var(--calc-fg); }

    /* ── Summary ── */
    .summary {
      max-width: 980px;
      margin: 0 auto;
      background: var(--card);
      border-radius: var(--radius);
      padding: 1.4rem 1.75rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .summary-heading {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      font-weight: 600;
      margin-bottom: 1.1rem;
    }
    .summary-grid { display: flex; flex-wrap: wrap; gap: 0.75rem; }
    .s-item {
      flex: 1 1 120px;
      background: var(--bg);
      border-radius: 11px;
      padding: 0.9rem 1rem;
      text-align: center;
    }
    .s-item.total { background: var(--text); color: white; }
    .s-name { font-size: 0.78rem; color: var(--muted); margin-bottom: 0.3rem; }
    .s-item.total .s-name { color: #94a3b8; }
    .s-hours { font-size: 1.45rem; font-weight: 800; }
    .s-item.total .s-hours { color: white; }
    .s-unit { font-size: 0.68rem; color: #94a3b8; margin-top: 0.15rem; }

    .lunch-note {
      max-width: 980px;
      margin: 0.75rem auto 0;
      font-size: 0.78rem;
      color: var(--muted);
      text-align: right;
      padding: 0 0.25rem;
    }
    .lunch-note span {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.25rem 0.65rem;
    }

    @media (max-width: 600px) {
      .cards-grid { grid-template-columns: 1fr; }
      .settings-bar { flex-wrap: wrap; justify-content: center; }
    }
  </style>
</head>
<body>

<div class="page-header">
  <h1>Work Hours Dashboard</h1>
  <p>Minsk Team &middot; Monthly calculator</p>
</div>

<!-- Settings bar -->
<div class="settings-bar">
  <span>Month:</span>
  <select id="sel-month">
    <option value="1">January</option>
    <option value="2">February</option>
    <option value="3">March</option>
    <option value="4">April</option>
    <option value="5">May</option>
    <option value="6">June</option>
    <option value="7">July</option>
    <option value="8">August</option>
    <option value="9">September</option>
    <option value="10">October</option>
    <option value="11">November</option>
    <option value="12">December</option>
  </select>
  <input type="number" id="sel-year" value="2026" min="2020" max="2035" />
  <div class="bar-sep"></div>
  <span>CA &#8594; Minsk offset:</span>
  <input type="number" id="tz-offset" value="10" min="-24" max="24" title="Hours difference: Minsk minus California" />
  <span>h</span>
</div>

<!-- Groups rendered by JS -->
<div id="app"></div>

<!-- Summary -->
<div class="summary" id="summary">
  <div class="summary-heading" id="summary-heading">Monthly Summary</div>
  <div class="summary-grid" id="summary-grid"></div>
</div>
<div class="lunch-note">
  <span>&#x1F371; 1 hour lunch break is already deducted from all shift totals</span>
</div>

<script>
"use strict";

// ── Constants ─────────────────────────────────────────────────────────────────

const DAYS_LABEL  = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
const MONTH_NAMES = ["January","February","March","April","May","June",
                     "July","August","September","October","November","December"];

// ── Default state ─────────────────────────────────────────────────────────────

const defaultData = {
  selectedYear: 2026,
  selectedMonth: 3,
  groups: [
    {
      id: "weekday",
      title: "Weekdays Group",
      workDayMask: [1, 2, 3, 4],
      employees: [
        { id: 1, name: "Alexei", shift: "Day Shift",   caStart: "06:00", caEnd: "14:00" },
        { id: 2, name: "Boris",  shift: "Night Shift",  caStart: "14:00", caEnd: "22:00" }
      ]
    },
    {
      id: "weekend",
      title: "Weekends Group",
      workDayMask: [5, 6, 0],
      employees: [
        { id: 3, name: "Vladimir", shift: "Day Shift",   caStart: "06:00", caEnd: "14:00" },
        { id: 4, name: "Gleb",     shift: "Night Shift", caStart: "14:00", caEnd: "22:00" }
      ]
    }
  ],
  nextId: 5
};

let state = loadState();

// ── Persistence ───────────────────────────────────────────────────────────────

function loadState() {
  try {
    const saved = localStorage.getItem("minsk_schedule_v2");
    if (saved) {
      const parsed = JSON.parse(saved);
      (parsed.groups || []).forEach(g => {
        if (!g.workDayMask) g.workDayMask = (g.id === "weekend") ? [5,6,0] : [1,2,3,4];
        (g.employees || []).forEach(e => { delete e.daysPerMonth; delete e.days; });
      });
      if (!parsed.selectedYear)  parsed.selectedYear  = new Date().getFullYear();
      if (!parsed.selectedMonth) parsed.selectedMonth = new Date().getMonth() + 1;
      return parsed;
    }
  } catch(e) {}
  return JSON.parse(JSON.stringify(defaultData));
}

function saveState() {
  try {
    localStorage.setItem("minsk_schedule_v2", JSON.stringify(state));
  } catch(e) {}
}

// ── Math ──────────────────────────────────────────────────────────────────────

function toMins(t) {
  const [h, m] = t.split(":").map(Number);
  return h * 60 + (m || 0);
}

function addHours(t, h) {
  let mins = toMins(t) + h * 60;
  const isNextDay = mins >= 1440;
  mins = ((mins % 1440) + 1440) % 1440;
  const hh = String(Math.floor(mins / 60)).padStart(2, "0");
  const mm = String(mins % 60).padStart(2, "0");
  return { time: `${hh}:${mm}`, next: isNextDay };
}

function shiftHours(start, end) {
  let diff = toMins(end) - toMins(start);
  if (diff <= 0) diff += 1440;
  return diff / 60 - 1; // minus 1h lunch break
}

function fmt(h) {
  return Number.isInteger(h) ? h.toString() : h.toFixed(1);
}

// Count occurrences of given weekdays (0=Sun…6=Sat) in a calendar month
function countDaysInMonth(year, month, mask) {
  let total = 0;
  const d = new Date(year, month - 1, 1);
  while (d.getMonth() === month - 1) {
    if (mask.includes(d.getDay())) total++;
    d.setDate(d.getDate() + 1);
  }
  return total;
}

function getOffset() {
  return parseInt(document.getElementById("tz-offset").value, 10) || 0;
}

function initial(name) {
  return (name || "?").trim().charAt(0).toUpperCase();
}

function daysForGroup(group) {
  return countDaysInMonth(state.selectedYear, state.selectedMonth, group.workDayMask);
}

function renderTimePick(value, groupId, empId, field) {
  const v = value || "00:00";
  return `<span class="time-chip" id="tc-${empId}-${field}"
    onclick="activateTimeChip('${groupId}',${empId},'${field}')">${v}</span>`;
}

function activateTimeChip(groupId, empId, field) {
  const chip = document.getElementById(`tc-${empId}-${field}`);
  if (!chip || chip.classList.contains("editing")) return;
  const cur = chip.textContent.trim();
  chip.classList.add("editing");
  chip.innerHTML = `<input type="text" maxlength="5" value="${cur}" placeholder="HH:MM"
    onkeydown="timeChipKey(event,'${groupId}',${empId},'${field}')"
    onblur="commitTimeChip('${groupId}',${empId},'${field}',this.value)" />`;
  const inp = chip.querySelector("input");
  inp.focus();
  inp.select();
}

function commitTimeChip(groupId, empId, field, raw) {
  const chip = document.getElementById(`tc-${empId}-${field}`);
  const g = state.groups.find(g => g.id === groupId);
  if (!g || !chip) return;
  const emp = g.employees.find(e => e.id === empId);
  if (!emp) return;

  let val = raw.trim().replace(/[^\d:]/g, "");
  if (/^\d{3,4}$/.test(val)) val = val.slice(0, -2) + ":" + val.slice(-2);
  const m = val.match(/^(\d{1,2}):(\d{2})$/);
  if (m) {
    const h   = Math.min(23, parseInt(m[1], 10));
    const raw_m = parseInt(m[2], 10);
    const min = [0, 15, 30, 45].reduce((a, b) =>
      Math.abs(b - raw_m) < Math.abs(a - raw_m) ? b : a);
    emp[field] = String(h).padStart(2, "0") + ":" + String(min).padStart(2, "0");
  }

  chip.classList.remove("editing");
  chip.textContent = emp[field];
  saveState();
  updateMinskTime(emp);
  const hps  = shiftHours(emp.caStart, emp.caEnd);
  const days = daysForGroup(g);
  const hpsEl = document.getElementById(`hps-${emp.id}`);
  const hpmEl = document.getElementById(`hpm-${emp.id}`);
  if (hpsEl) hpsEl.textContent = fmt(hps)        + " h";
  if (hpmEl) hpmEl.textContent = fmt(hps * days) + " h";
  renderSummary();
}

function timeChipKey(e, groupId, empId, field) {
  if (e.key === "Enter")  { e.preventDefault(); e.target.blur(); }
  if (e.key === "Escape") {
    const chip = document.getElementById(`tc-${empId}-${field}`);
    const g    = state.groups.find(g => g.id === groupId);
    const emp  = g && g.employees.find(e => e.id === empId);
    if (chip && emp) { chip.classList.remove("editing"); chip.textContent = emp[field]; }
  }
}

// ── Render ────────────────────────────────────────────────────────────────────

function render() {
  document.getElementById("app").innerHTML = state.groups.map(renderGroup).join("");
  renderSummary();
  document.getElementById("sel-month").value = state.selectedMonth;
  document.getElementById("sel-year").value  = state.selectedYear;
}

function renderGroup(group) {
  const isWE = group.id === "weekend";
  const cls  = isWE ? "weekend" : "weekday";
  const days = daysForGroup(group);
  const cards = group.employees.map(emp => renderCard(emp, group)).join("");

  const dayToggles = DAYS_LABEL.map((label, idx) => {
    const active = group.workDayMask.includes(idx) ? "active" : "";
    return `<button class="day-toggle ${active}" onclick="toggleWorkDay('${group.id}',${idx})">${label}</button>`;
  }).join("");

  return `
  <div class="group ${cls}" id="group-${group.id}">
    <div class="group-header">
      <div class="group-dot"></div>
      <div class="group-title-wrap">
        <input class="group-title-input" type="text" value="${esc(group.title)}"
               onchange="updateGroup('${group.id}','title',this.value)" />
        <div class="days-row">
          ${dayToggles}
          <span class="wdays-badge" id="wdays-count-${group.id}">${days} days</span>
        </div>
      </div>
      <button class="add-emp-btn" onclick="addEmployee('${group.id}')">+ Add employee</button>
    </div>
    <div class="cards-grid">${cards}</div>
  </div>`;
}

function renderCard(emp, group) {
  const offset = getOffset();
  const hps  = shiftHours(emp.caStart, emp.caEnd);
  const days = daysForGroup(group);
  const hpm  = hps * days;
  const ms   = addHours(emp.caStart, offset);
  const me   = addHours(emp.caEnd,   offset);

  return `
  <div class="card" id="card-${emp.id}">
    <button class="card-del" onclick="deleteEmployee('${group.id}',${emp.id})" title="Remove">&#10005;</button>

    <div class="card-name-row">
      <div class="avatar" id="av-${emp.id}">${initial(emp.name)}</div>
      <input class="name-input" type="text" value="${esc(emp.name)}"
             oninput="liveAvatar(${emp.id},this.value)"
             onchange="updateEmp('${group.id}',${emp.id},'name',this.value)" />
    </div>

    <input class="shift-input" type="text" value="${esc(emp.shift)}"
           onchange="updateEmp('${group.id}',${emp.id},'shift',this.value)" />

    <div class="field-row">
      <span class="field-label">California time</span>
      <div class="field-right">
        ${renderTimePick(emp.caStart, group.id, emp.id, 'caStart')}
        <span class="time-sep">&#8211;</span>
        ${renderTimePick(emp.caEnd, group.id, emp.id, 'caEnd')}
      </div>
    </div>

    <div class="field-row">
      <span class="field-label">Minsk time</span>
      <div class="field-right">
        <span class="minsk-time" id="ms-${emp.id}">
          ${ms.time} &#8211; ${me.time}
        </span>
      </div>
    </div>

    <div class="divider"></div>

    <div class="calc-row">
      <span class="calc-label">Hours per shift <span style="font-weight:400;opacity:0.7">(−1h lunch)</span></span>
      <span class="calc-value" id="hps-${emp.id}">${fmt(hps)} h</span>
    </div>
    <div class="calc-row">
      <span class="calc-label">Hours per month</span>
      <span class="calc-value" id="hpm-${emp.id}">${fmt(hpm)} h</span>
    </div>
  </div>`;
}

function renderSummary() {
  const heading = document.getElementById("summary-heading");
  if (heading) {
    heading.textContent = `Monthly Summary \u00b7 ${MONTH_NAMES[state.selectedMonth - 1]} ${state.selectedYear}`;
  }

  let total = 0;
  let html = "";
  state.groups.forEach(group => {
    const days = daysForGroup(group);
    group.employees.forEach(emp => {
      const h = shiftHours(emp.caStart, emp.caEnd) * days;
      total += h;
      html += `
      <div class="s-item">
        <div class="s-name">${esc(emp.name)}</div>
        <div class="s-hours">${fmt(h)}</div>
        <div class="s-unit">hrs / mo</div>
      </div>`;
    });
  });
  html += `
  <div class="s-item total">
    <div class="s-name">Total</div>
    <div class="s-hours">${fmt(total)}</div>
    <div class="s-unit">hrs / mo</div>
  </div>`;
  document.getElementById("summary-grid").innerHTML = html;
}

// ── Live updates (without full re-render) ─────────────────────────────────────

function liveAvatar(id, name) {
  const el = document.getElementById(`av-${id}`);
  if (el) el.textContent = initial(name);
}

function updateMinskTime(emp) {
  const offset = getOffset();
  const ms = addHours(emp.caStart, offset);
  const me = addHours(emp.caEnd,   offset);
  const el = document.getElementById(`ms-${emp.id}`);
  if (el) el.innerHTML =
    `${ms.time} &#8211; ${me.time}`;
}

// Called when month/year changes — no DOM rebuild needed
function refreshAllCalcFields() {
  state.groups.forEach(group => {
    const days  = daysForGroup(group);
    const badge = document.getElementById(`wdays-count-${group.id}`);
    if (badge) badge.textContent = `${days} days`;
    group.employees.forEach(emp => {
      const hps  = shiftHours(emp.caStart, emp.caEnd);
      const hpsEl = document.getElementById(`hps-${emp.id}`);
      const hpmEl = document.getElementById(`hpm-${emp.id}`);
      if (hpsEl) hpsEl.textContent = fmt(hps)       + " h";
      if (hpmEl) hpmEl.textContent = fmt(hps * days) + " h";
    });
  });
  renderSummary();
}

// ── Mutations ─────────────────────────────────────────────────────────────────

function updateGroup(groupId, field, value) {
  const g = state.groups.find(g => g.id === groupId);
  if (g) { g[field] = value; saveState(); }
}

function toggleWorkDay(groupId, dayIndex) {
  const g = state.groups.find(g => g.id === groupId);
  if (!g) return;
  const pos = g.workDayMask.indexOf(dayIndex);
  if (pos >= 0) {
    if (g.workDayMask.length <= 1) return; // keep at least 1 day selected
    g.workDayMask.splice(pos, 1);
  } else {
    g.workDayMask.push(dayIndex);
  }
  saveState();
  render(); // full re-render to update toggle button states
}

function updateEmp(groupId, empId, field, value) {
  const g = state.groups.find(g => g.id === groupId);
  if (!g) return;
  const emp = g.employees.find(e => e.id === empId);
  if (!emp) return;
  emp[field] = value;
  saveState();
  updateMinskTime(emp);
  const hps   = shiftHours(emp.caStart, emp.caEnd);
  const days  = daysForGroup(g);
  const hpsEl = document.getElementById(`hps-${emp.id}`);
  const hpmEl = document.getElementById(`hpm-${emp.id}`);
  if (hpsEl) hpsEl.textContent = fmt(hps)       + " h";
  if (hpmEl) hpmEl.textContent = fmt(hps * days) + " h";
  renderSummary();
}

function addEmployee(groupId) {
  const g = state.groups.find(g => g.id === groupId);
  if (!g) return;
  g.employees.push({
    id: state.nextId++,
    name: "New Employee",
    shift: "Day Shift",
    caStart: "06:00",
    caEnd: "14:00"
  });
  saveState();
  render();
}

function deleteEmployee(groupId, empId) {
  const g = state.groups.find(g => g.id === groupId);
  if (!g) return;
  if (g.employees.length <= 1) {
    alert("At least one employee per group is required.");
    return;
  }
  g.employees = g.employees.filter(e => e.id !== empId);
  saveState();
  render();
}

// ── Event listeners ───────────────────────────────────────────────────────────

document.getElementById("sel-month").addEventListener("change", function() {
  state.selectedMonth = parseInt(this.value, 10);
  saveState();
  refreshAllCalcFields();
});

document.getElementById("sel-year").addEventListener("input", function() {
  const y = parseInt(this.value, 10);
  if (y >= 2020 && y <= 2035) {
    state.selectedYear = y;
    saveState();
    refreshAllCalcFields();
  }
});

document.getElementById("tz-offset").addEventListener("input", function() {
  state.groups.forEach(g => g.employees.forEach(emp => updateMinskTime(emp)));
});

// ── Helpers ───────────────────────────────────────────────────────────────────

function esc(str) {
  return String(str)
    .replace(/&/g, "&amp;")
    .replace(/"/g, "&quot;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");
}

// ── Boot ──────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
